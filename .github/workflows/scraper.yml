name: Scrape Duolingo Data

on:
  schedule:
    - cron: '0 6 * * *' 
  workflow_dispatch:  

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            chromium-chromedriver \
            libxss1 \
            fonts-liberation \
            libgbm1 \
            libnspr4 \
            libnss3 \
            xdg-utils \
            wget \
            curl \
            unzip \
            xvfb
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Chrome & ChromeDriver Versions
        run: |
          google-chrome --version
          chromedriver --version
          sudo chmod +x /usr/bin/chromedriver
          sudo chmod +x /usr/bin/google-chrome

      - name: Run Scraper Script
        env:
          DUOLINGO_EMAIL: ${{ secrets.DUOLINGO_EMAIL }}
          DUOLINGO_PASSWORD: ${{ secrets.DUOLINGO_PASSWORD }}
        run: |
          python chrome.py

      - name: List files in the working directory
        run: |
          ls -alh
          
      - name: Commit and push the updated stats.json to gh-pages
        run: |
          git fetch origin stats
          git checkout stats
          cp ./stats.json ./stats.json 
          git add stats.json
          git commit -m "Updated stats.json"
          git push origin stats

